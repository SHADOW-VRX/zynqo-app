<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Owner Dashboard - Zynqo</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Sidebar */
        .sidebar {
            position: fixed;
            left: 0;
            top: 0;
            width: 280px;
            height: 100%;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            box-shadow: 2px 0 20px rgba(0, 0, 0, 0.1);
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 100;
            overflow-y: auto;
            border-right: 1px solid rgba(255, 255, 255, 0.3);
        }

        .sidebar.closed {
            transform: translateX(-100%);
        }

        .sidebar-header {
            padding: 30px;
            text-align: center;
            background: linear-gradient(135deg, #4361ee, #3a0ca3);
            color: white;
        }

        .sidebar-header i {
            font-size: 2.5rem;
            margin-bottom: 10px;
        }

        .sidebar-header h2 {
            font-size: 1.5rem;
            font-weight: 700;
        }

        .sidebar-nav {
            padding: 20px 0;
        }

        .nav-item {
            padding: 14px 25px;
            margin: 5px 15px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 12px;
            border-radius: 12px;
            color: #1e293b;
        }

        .nav-item:hover {
            background: rgba(67, 97, 238, 0.1);
            transform: translateX(5px);
        }

        .nav-item.active {
            background: linear-gradient(135deg, #4361ee, #3a0ca3);
            color: white;
            box-shadow: 0 4px 15px rgba(67, 97, 238, 0.3);
        }

        .nav-item i {
            width: 24px;
            font-size: 1.2rem;
        }

        /* Menu Toggle */
        .menu-toggle {
            position: fixed;
            left: 20px;
            top: 20px;
            background: rgba(255, 255, 255, 0.95);
            border: none;
            width: 50px;
            height: 50px;
            border-radius: 16px;
            cursor: pointer;
            z-index: 101;
            display: none;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            font-size: 1.2rem;
            color: #4361ee;
            backdrop-filter: blur(10px);
        }

        /* Main Content */
        .main-content {
            margin-left: 280px;
            padding: 20px;
            transition: margin-left 0.3s ease;
            min-height: 100vh;
        }

        .main-content.full-width {
            margin-left: 0;
        }

        /* Header */
        .top-header {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            border-radius: 20px;
            padding: 20px 25px;
            margin-bottom: 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.08);
            flex-wrap: wrap;
            gap: 15px;
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        .page-title {
            font-size: 1.5rem;
            font-weight: 700;
            background: linear-gradient(135deg, #4361ee, #3a0ca3);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .logout-btn {
            background: linear-gradient(135deg, #ef4444, #dc2626);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .logout-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(239, 68, 68, 0.3);
        }

        /* Stats Cards */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.08);
            transition: all 0.3s ease;
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        .stat-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15);
        }

        .stat-icon {
            font-size: 2rem;
            margin-bottom: 10px;
        }

        .stat-value {
            font-size: 2rem;
            font-weight: 800;
            margin: 10px 0;
            color: #4361ee;
        }

        .stat-label {
            color: #64748b;
            font-size: 0.9rem;
            font-weight: 500;
        }

        /* Tables */
        .table-container {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.08);
            overflow-x: auto;
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        .table-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 15px;
        }

        .btn-add {
            background: linear-gradient(135deg, #10b981, #059669);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn-add:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(16, 185, 129, 0.3);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            min-width: 600px;
        }

        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #e2e8f0;
        }

        th {
            background: #f8fafc;
            font-weight: 600;
            color: #1e293b;
        }

        tr:hover {
            background: #f8fafc;
        }

        .btn-edit, .btn-delete {
            padding: 6px 12px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            margin: 0 3px;
            transition: all 0.2s ease;
        }

        .btn-edit {
            background: #f59e0b;
            color: white;
        }

        .btn-delete {
            background: #ef4444;
            color: white;
        }

        .btn-edit:hover, .btn-delete:hover {
            transform: scale(1.05);
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(10px);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .modal.show {
            display: flex;
            animation: fadeIn 0.3s ease;
        }

        .modal-content {
            background: rgba(255, 255, 255, 0.98);
            backdrop-filter: blur(20px);
            border-radius: 24px;
            width: 90%;
            max-width: 500px;
            max-height: 85vh;
            overflow-y: auto;
            animation: slideUp 0.3s ease;
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .modal-header {
            padding: 20px;
            border-bottom: 1px solid #e2e8f0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }

        .modal-body {
            padding: 20px;
        }

        .modal-footer {
            padding: 20px;
            border-top: 1px solid #e2e8f0;
            display: flex;
            justify-content: flex-end;
            gap: 10px;
            flex-wrap: wrap;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: 600;
            color: #1e293b;
        }

        .form-control {
            width: 100%;
            padding: 10px;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            font-size: 0.95rem;
            font-family: 'Inter', sans-serif;
            transition: all 0.3s ease;
        }

        .form-control:focus {
            outline: none;
            border-color: #4361ee;
            box-shadow: 0 0 0 3px rgba(67, 97, 238, 0.1);
        }

        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: rgba(51, 51, 51, 0.95);
            backdrop-filter: blur(10px);
            color: white;
            padding: 12px 20px;
            border-radius: 12px;
            z-index: 2000;
            animation: slideInRight 0.3s ease;
        }

        @keyframes slideInRight {
            from {
                opacity: 0;
                transform: translateX(100px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        /* Responsive */
        @media (max-width: 768px) {
            .menu-toggle {
                display: block;
            }
            
            .sidebar {
                transform: translateX(-100%);
            }
            
            .sidebar.open {
                transform: translateX(0);
            }
            
            .main-content {
                margin-left: 0;
                padding: 70px 15px 15px 15px;
            }
            
            .stats-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <button class="menu-toggle" id="menuToggle" onclick="toggleSidebar()">
        <i class="fas fa-bars"></i>
    </button>
    
    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <i class="fas fa-store"></i>
            <h2>Zynqo Admin</h2>
        </div>
        <div class="sidebar-nav">
            <div class="nav-item active" data-page="dashboard">
                <i class="fas fa-chart-line"></i>
                <span>Dashboard</span>
            </div>
            <div class="nav-item" data-page="products">
                <i class="fas fa-box"></i>
                <span>Products</span>
            </div>
            <div class="nav-item" data-page="orders">
                <i class="fas fa-shopping-cart"></i>
                <span>Orders</span>
            </div>
        </div>
    </div>

    <div class="main-content" id="mainContent">
        <div class="top-header">
            <h1 class="page-title" id="pageTitle">Dashboard</h1>
            <button class="logout-btn" onclick="logout()">
                <i class="fas fa-sign-out-alt"></i> Logout
            </button>
        </div>

        <div id="dashboardPage" class="page-content">
            <div class="stats-grid" id="statsGrid"></div>
        </div>

        <div id="productsPage" class="page-content" style="display: none;">
            <div class="table-container">
                <div class="table-header">
                    <h2>Product Management</h2>
                    <button class="btn-add" onclick="showAddProductModal()">
                        <i class="fas fa-plus"></i> Add Product
                    </button>
                </div>
                <div style="overflow-x: auto;">
                    <table id="productsTable">
                        <thead><tr><th>ID</th><th>Name</th><th>Price</th><th>Code</th><th>Stock</th><th>Actions</th></tr></thead>
                        <tbody id="productsTableBody"></tbody>
                    </table>
                </div>
            </div>
        </div>

        <div id="ordersPage" class="page-content" style="display: none;">
            <div class="table-container">
                <h2>Order History</h2>
                <div style="overflow-x: auto;">
                    <table id="ordersTable">
                        <thead><tr><th>Order ID</th><th>Date</th><th>Items</th><th>Total</th><th>Actions</th></tr></thead>
                        <tbody id="ordersTableBody"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <div id="productModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="modalTitle">Add Product</h3>
                <button onclick="closeModal('productModal')" style="background: none; border: none; font-size: 1.5rem; cursor: pointer;">&times;</button>
            </div>
            <div class="modal-body">
                <form id="productForm">
                    <input type="hidden" id="productId">
                    <div class="form-group">
                        <label>Product Name</label>
                        <input type="text" id="productName" class="form-control" required>
                    </div>
                    <div class="form-group">
                        <label>Price (₹)</label>
                        <input type="number" id="productPrice" class="form-control" step="0.01" required>
                    </div>
                    <div class="form-group">
                        <label>Barcode/Code</label>
                        <input type="text" id="productCode" class="form-control" required>
                    </div>
                    <div class="form-group">
                        <label>Category</label>
                        <input type="text" id="productCategory" class="form-control">
                    </div>
                    <div class="form-group">
                        <label>Stock Quantity</label>
                        <input type="number" id="productStock" class="form-control" value="0">
                    </div>
                    <div class="form-group">
                        <label>Image Emoji</label>
                        <input type="text" id="productImage" class="form-control" placeholder="e.g., 🥛">
                    </div>
                    <div class="form-group">
                        <label>Description</label>
                        <textarea id="productDescription" class="form-control" rows="3"></textarea>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button class="btn-delete" onclick="closeModal('productModal')">Cancel</button>
                <button class="btn-add" onclick="saveProduct()">Save</button>
            </div>
        </div>
    </div>

    <script>
        let currentPage = 'dashboard';
        let editingProductId = null;

        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            sidebar.classList.toggle('open');
        }

        document.querySelectorAll('.nav-item').forEach(item => {
            item.addEventListener('click', () => {
                document.querySelectorAll('.nav-item').forEach(nav => nav.classList.remove('active'));
                item.classList.add('active');
                currentPage = item.dataset.page;
                document.getElementById('dashboardPage').style.display = currentPage === 'dashboard' ? 'block' : 'none';
                document.getElementById('productsPage').style.display = currentPage === 'products' ? 'block' : 'none';
                document.getElementById('ordersPage').style.display = currentPage === 'orders' ? 'block' : 'none';
                document.getElementById('pageTitle').textContent = item.querySelector('span').textContent;
                
                if (currentPage === 'dashboard') loadDashboard();
                else if (currentPage === 'products') loadProducts();
                else if (currentPage === 'orders') loadOrders();
                
                if (window.innerWidth <= 768) {
                    document.getElementById('sidebar').classList.remove('open');
                }
            });
        });

        async function loadDashboard() {
            try {
                const response = await fetch('/api/owner/stats');
                const data = await response.json();
                if (data.success) {
                    const stats = data.stats;
                    document.getElementById('statsGrid').innerHTML = `
                        <div class="stat-card"><div class="stat-icon">📦</div><div class="stat-value">${stats.total_products}</div><div class="stat-label">Total Products</div></div>
                        <div class="stat-card"><div class="stat-icon">🛒</div><div class="stat-value">${stats.total_orders}</div><div class="stat-label">Total Orders</div></div>
                        <div class="stat-card"><div class="stat-icon">💰</div><div class="stat-value">₹${stats.total_revenue.toFixed(2)}</div><div class="stat-label">Total Revenue</div></div>
                        <div class="stat-card"><div class="stat-icon">📊</div><div class="stat-value">${stats.total_items_sold}</div><div class="stat-label">Items Sold</div></div>
                        <div class="stat-card"><div class="stat-icon">⚠️</div><div class="stat-value">${stats.low_stock_products}</div><div class="stat-label">Low Stock Items</div></div>
                    `;
                }
            } catch (error) {
                console.error('Error loading dashboard:', error);
            }
        }

        async function loadProducts() {
            try {
                const response = await fetch('/api/owner/products');
                const data = await response.json();
                if (data.success) {
                    const tbody = document.getElementById('productsTableBody');
                    tbody.innerHTML = data.products.map(product => `
                        <tr>
                            <td>${product.id}</td>
                            <td>${product.image || '📦'} ${product.name}</td>
                            <td>₹${product.price}</td>
                            <td>${product.code}</td>
                            <td>${product.stock || 0}</td>
                            <td>
                                <button class="btn-edit" onclick="editProduct('${product.id}')"><i class="fas fa-edit"></i></button>
                                <button class="btn-delete" onclick="deleteProduct('${product.id}')"><i class="fas fa-trash"></i></button>
                            </td>
                        </tr>
                    `).join('');
                }
            } catch (error) {
                console.error('Error loading products:', error);
            }
        }

        async function loadOrders() {
            try {
                const response = await fetch('/api/owner/orders');
                const data = await response.json();
                if (data.success) {
                    const tbody = document.getElementById('ordersTableBody');
                    tbody.innerHTML = data.orders.map(order => `
                        <tr>
                            <td>${order.order_id}</td>
                            <td>${order.date}</td>
                            <td>${order.item_count}</td>
                            <td>₹${order.total.toFixed(2)}</td>
                            <td>
                                <button class="btn-delete" onclick="deleteOrder('${order.order_id}')"><i class="fas fa-trash"></i></button>
                            </td>
                        </tr>
                    `).join('');
                }
            } catch (error) {
                console.error('Error loading orders:', error);
            }
        }

        function showAddProductModal() {
            editingProductId = null;
            document.getElementById('modalTitle').textContent = 'Add Product';
            document.getElementById('productForm').reset();
            document.getElementById('productModal').classList.add('show');
        }

        async function editProduct(productId) {
            try {
                const response = await fetch('/api/owner/products');
                const data = await response.json();
                const product = data.products.find(p => p.id === productId);
                if (product) {
                    editingProductId = productId;
                    document.getElementById('modalTitle').textContent = 'Edit Product';
                    document.getElementById('productId').value = product.id;
                    document.getElementById('productName').value = product.name;
                    document.getElementById('productPrice').value = product.price;
                    document.getElementById('productCode').value = product.code;
                    document.getElementById('productCategory').value = product.category || '';
                    document.getElementById('productStock').value = product.stock || 0;
                    document.getElementById('productImage').value = product.image || '';
                    document.getElementById('productDescription').value = product.description || '';
                    document.getElementById('productModal').classList.add('show');
                }
            } catch (error) {
                console.error('Error loading product:', error);
            }
        }

        async function saveProduct() {
            const productData = {
                name: document.getElementById('productName').value,
                price: parseFloat(document.getElementById('productPrice').value),
                code: document.getElementById('productCode').value,
                category: document.getElementById('productCategory').value,
                stock: parseInt(document.getElementById('productStock').value),
                image: document.getElementById('productImage').value,
                description: document.getElementById('productDescription').value
            };

            try {
                let response;
                if (editingProductId) {
                    response = await fetch(`/api/owner/products/${editingProductId}`, {
                        method: 'PUT',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(productData)
                    });
                } else {
                    response = await fetch('/api/owner/products', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(productData)
                    });
                }
                
                const data = await response.json();
                if (data.success) {
                    closeModal('productModal');
                    loadProducts();
                    showToast(editingProductId ? 'Product updated!' : 'Product added!');
                } else {
                    showToast('Error: ' + data.message, 'error');
                }
            } catch (error) {
                console.error('Error saving product:', error);
                showToast('Error saving product', 'error');
            }
        }

        async function deleteProduct(productId) {
            if (confirm('Are you sure you want to delete this product?')) {
                try {
                    const response = await fetch(`/api/owner/products/${productId}`, {
                        method: 'DELETE'
                    });
                    const data = await response.json();
                    if (data.success) {
                        loadProducts();
                        showToast('Product deleted!');
                    }
                } catch (error) {
                    console.error('Error deleting product:', error);
                }
            }
        }

        async function deleteOrder(orderId) {
            if (confirm('Are you sure you want to delete this order?')) {
                try {
                    const response = await fetch(`/api/owner/orders/${orderId}`, {
                        method: 'DELETE'
                    });
                    const data = await response.json();
                    if (data.success) {
                        loadOrders();
                        showToast('Order deleted!');
                    }
                } catch (error) {
                    console.error('Error deleting order:', error);
                }
            }
        }

        function closeModal(modalId) {
            document.getElementById(modalId).classList.remove('show');
        }

        function showToast(message, type = 'success') {
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.innerHTML = `<i class="fas fa-${type === 'success' ? 'check-circle' : 'exclamation-circle'}"></i> ${message}`;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        async function logout() {
            try {
                await fetch('/api/owner/logout', { method: 'POST' });
                window.location.href = '/owner-login';
            } catch (error) {
                console.error('Error logging out:', error);
                window.location.href = '/owner-login';
            }
        }

        loadDashboard();
        
        window.addEventListener('resize', function() {
            if (window.innerWidth > 768) {
                document.getElementById('sidebar').classList.remove('open');
            }
        });
    </script>
</body>
</html>
